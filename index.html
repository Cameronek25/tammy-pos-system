<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tammy’s Bar & Grill | Employee Access</title>
  <style>
    :root {
      --bg: #fefcfc;
      --surface: #ffffff;
      --text: #1e1e1e;
      --muted: #9c948b;
      --border: #e8e1d7;
      --accent: #7792bd;
      --accent-dark: #40537c;
      --accent-soft: #e6efff;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #fefcfc 0%, #f7f3ee 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 40px 32px;
    }

    .brand { text-align: center; margin-bottom: 28px; }
    .brand h1 { margin: 0; font-size: 2rem; color: var(--accent-dark); }
    .brand p { margin-top: 8px; color: var(--muted); }

    .login-form { display: flex; flex-direction: column; gap: 20px; }

    .pin-input {
      height: 64px;
      border: 1px solid var(--border);
      border-radius: 16px;
      text-align: center;
      font-size: 1.6rem;
      letter-spacing: 14px;
      outline: none;
      transition: 0.2s ease;
    }

    .pin-input:focus {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: 0 0 0 3px rgba(119, 146, 189, 0.15);
    }

    .login-btn {
      height: 52px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .login-btn:hover { transform: translateY(-1px); }

    .error {
      color: #b91c1c;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <h1>Tammy’s Bar & Grill</h1>
      <p>Enter your 4-digit employee credential</p>
    </div>

    <form class="login-form" id="loginForm">
      <input
        class="pin-input"
        type="password"
        id="employeePin"
        maxlength="4"
        inputmode="numeric"
        placeholder="••••"
        required
        autofocus
      />

      <div class="error" id="errorMsg">Invalid PIN</div>

      <button type="submit" class="login-btn">Enter System</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const pinInput = document.getElementById("employeePin");
    const errorMsg = document.getElementById("errorMsg");

    pinInput.addEventListener("input", function () {
      this.value = this.value.replace(/\D/g, "").slice(0, 4);
      errorMsg.style.display = "none";
    });

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      if (pinInput.value === "1234") {
        localStorage.setItem("tammy-session-pin", pinInput.value);
        window.location.href = "./dashboard.html";
      } else {
        errorMsg.style.display = "block";
        pinInput.value = "";
        pinInput.focus();
      }
    });
  </script>
</body>
</html>
