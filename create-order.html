<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Order</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap');

    :root {
      --bg: #f3f4f7;
      --surface: #ffffff;
      --surface-soft: #f8f9fc;
      --text: #1e1e1e;
      --muted: #8f887f;
      --border: #e5ded4;
      --accent: #5b7dbf;
      --accent-dark: #3f5ea0;
      --accent-soft: #e9f0fb;
      --shadow: 0 10px 28px rgba(0, 0, 0, 0.06);
      --gold: #b99a61;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 32px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(to bottom, #f4f5f8, #eef1f6);
      color: var(--text);
      line-height: 1.5;
      letter-spacing: 0.2px;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 34px;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: var(--text);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .employee-text {
      font-size: 14px;
      color: var(--muted);
      font-weight: 500;
    }

    .logout-btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: all 0.18s ease;
    }

    .logout-btn:hover {
      background: #f4f2ee;
      transform: translateY(-1px);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 30px;
    }

    .action-card {
      min-height: 84px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.18s ease;
    }

    .action-card:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .action-card.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .action-icon {
      font-size: 16px;
      opacity: 0.7;
      display: inline-flex;
      align-items: center;
    }

    .action-card.active .action-icon {
      opacity: 1;
    }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 32px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      border: 1px solid #d7e3fa;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .form-header {
      margin-bottom: 24px;
    }

    .form-header h2 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 26px;
    }

    .summary-box {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
    }

    .summary-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .summary-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
      color: var(--text);
      transition: all 0.18s ease;
    }

    input::placeholder,
    textarea::placeholder {
      color: #aaa297;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(91, 125, 191, 0.12);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      gap: 14px;
      margin-top: 16px;
    }

    .primary-btn,
    .secondary-btn {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .primary-btn {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      flex: 1;
      box-shadow: 0 10px 20px rgba(91, 125, 191, 0.18);
    }

    .primary-btn:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
      transform: translateY(-1px);
    }

    .secondary-btn {
      background: var(--surface);
      color: var(--text);
      flex: 1;
      box-shadow: var(--shadow);
    }

    .secondary-btn:hover {
      background: #f4f2ee;
    }

    @media (max-width: 900px) {
      .actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .summary-strip,
      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 20px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .topbar-right {
        width: 100%;
        justify-content: space-between;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .brand {
        font-size: 20px;
      }

      .action-card {
        min-height: 76px;
        font-size: 15px;
      }

      .form-card {
        padding: 22px;
      }

      .form-header h2 {
        font-size: 24px;
      }

      .button-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">Tammy’s Bar &amp; Grille</div>

      <div class="topbar-right">
        <span class="employee-text">Employee <strong id="employeeId"></strong></span>
        <button type="button" class="logout-btn" onclick="logout()">Log Out</button>
      </div>
    </div>

    <div class="actions">
      <a href="./dashboard.html" class="action-card">
        <span class="action-icon">◫</span>
        <span>Dashboard</span>
      </a>

      <a href="./create-order.html" class="action-card active">
        <span class="action-icon">＋</span>
        <span>Order Details</span>
      </a>

      <a href="./kitchen-queue.html" class="action-card">
        <span class="action-icon">≣</span>
        <span>Kitchen Queue</span>
      </a>

      <a href="./manager.html" class="action-card">
        <span class="action-icon">⚙</span>
        <span>Manager Tools</span>
      </a>
    </div>

    <div class="form-card">
      <div class="badge">Step 1 • New Ticket</div>

      <div class="form-header">
        <h2>Create Order</h2>
      </div>

      <div class="summary-strip">
        <div class="summary-box">
          <div class="summary-label">Employee</div>
          <div class="summary-value" id="summaryEmployee">—</div>
        </div>

        <div class="summary-box">
          <div class="summary-label">Status</div>
          <div class="summary-value">New Order</div>
        </div>

        <div class="summary-box">
          <div class="summary-label">Stage</div>
          <div class="summary-value">Order Setup</div>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label for="tableNumber">Table Number</label>
          <input type="number" id="tableNumber" placeholder="Enter table number">
        </div>

        <div class="form-group">
          <label for="guestCount">Guest Count</label>
          <input type="number" id="guestCount" placeholder="Optional">
        </div>

        <div class="form-group full">
          <label for="allergies">Allergy Alert</label>
          <input type="text" id="allergies" placeholder="Enter allergies (e.g., peanuts, dairy, gluten)">
        </div>

        <div class="form-group full">
          <label for="notes">Additional Notes</label>
          <textarea id="notes" placeholder="Special requests, preferences, etc."></textarea>
        </div>
      </div>

      <div class="button-row">
        <button type="button" class="primary-btn" onclick="startOrder()">Continue</button>
        <button type="button" class="secondary-btn" onclick="goBack()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    function logout() {
      localStorage.removeItem("tammy-session-pin");
      window.location.href = "./index.html";
    }

    function goBack() {
      window.location.href = "./dashboard.html";
    }

    document.addEventListener("DOMContentLoaded", function () {
      const empId = localStorage.getItem("tammy-session-pin");
      const topDisplay = document.getElementById("employeeId");
      const summaryDisplay = document.getElementById("summaryEmployee");

      if (topDisplay) {
        topDisplay.textContent = empId || "—";
      }

      if (summaryDisplay) {
        summaryDisplay.textContent = empId || "—";
      }
    });

    function startOrder() {
      const table = document.getElementById("tableNumber").value.trim();
      const guestCount = document.getElementById("guestCount").value.trim();
      const allergies = document.getElementById("allergies").value.trim();
      const notes = document.getElementById("notes").value.trim();

      if (!table) {
        alert("Please enter a table number.");
        return;
      }

      localStorage.setItem("active-table", table);
      localStorage.setItem("active-guests", guestCount);
      localStorage.setItem("active-allergies", allergies);
      localStorage.setItem("active-notes", notes);

      window.location.href = "./order-entry.html";
    }
  </script>
</body>
</html>
